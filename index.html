<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MANLIX Messenger</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <header class="sidebar__header">
          <h1>MANLIX</h1>
          <input id="chatSearch" type="text" placeholder="Поиск" />
        </header>
        <ul id="chatList" class="chat-list"></ul>
      </aside>

      <main class="chat-window">
        <header class="chat-window__header">
          <div>
            <h2 id="chatTitle">Выберите чат</h2>
            <p id="chatStatus">Оффлайн</p>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <form id="messageForm" class="composer" autocomplete="off">
          <input id="messageInput" type="text" placeholder="Введите сообщение..." required />
          <button type="submit">Отправить</button>
        </form>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
